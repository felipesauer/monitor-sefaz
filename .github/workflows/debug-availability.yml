name: Debug availability (temporário)

# Diagnóstico manual: roda no runner (rede aberta) o debug-availability para
# entender por que a fonte availability (página da Receita) vem 0/135.
# TEMPORÁRIO — remover após o diagnóstico. Só dispatch, não agenda nada.
on:
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  debug:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - name: Diagnóstico da página da Receita
        run: pnpm --filter @monitor-sefaz/collector debug-availability
