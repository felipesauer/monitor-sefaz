name: Coletar status SEFAZ

# Roda periodicamente, coleta o status da página oficial de disponibilidade e
# commita os JSONs em apps/web/public/data/ — consumidos pela SPA no GitHub Pages.
on:
  schedule:
    # De hora em hora, no minuto 17 (fora da hora cheia, que é mais concorrida).
    # O cron do GitHub Actions é best-effort e quase nunca honra granularidade
    # sub-horária (com '7,37' observamos ~6 coletas/dia em vez de 48). Cadência
    # horária é disparada de forma muito mais consistente.
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write
  actions: write # para disparar o deploy do Pages após commitar os dados

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Sincronizar com o remoto
        # Garante que a coleta parta do history.json MAIS RECENTE (outra rodada
        # pode ter commitado nesse meio-tempo). Sem isso, o append parte de uma
        # base velha e sobrescreve pontos no push.
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash origin main

      - name: Coletar status
        run: pnpm --filter @monitor-sefaz/collector collect "$GITHUB_WORKSPACE/apps/web/public/data"
        env:
          # Notificações (opcional): definidas como secrets/vars do repositório.
          # Ausentes → o collector é no-op de notificação (nenhum efeito).
          NOTIFY_DISCORD_WEBHOOK_URL: ${{ secrets.NOTIFY_DISCORD_WEBHOOK_URL }}
          NOTIFY_SLACK_WEBHOOK_URL: ${{ secrets.NOTIFY_SLACK_WEBHOOK_URL }}
          NOTIFY_TELEGRAM_BOT_TOKEN: ${{ secrets.NOTIFY_TELEGRAM_BOT_TOKEN }}
          NOTIFY_TELEGRAM_CHAT_ID: ${{ secrets.NOTIFY_TELEGRAM_CHAT_ID }}
          NOTIFY_WEBHOOK_URL: ${{ secrets.NOTIFY_WEBHOOK_URL }}
          NOTIFY_EVENTS: ${{ vars.NOTIFY_EVENTS }}
          NOTIFY_DIGEST_HOUR: ${{ vars.NOTIFY_DIGEST_HOUR }}

      - name: Commitar dados atualizados
        run: |
          git add apps/web/public/data
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
            echo "changed=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          git commit -m "chore(data): atualiza status SEFAZ [skip ci]"
          # Push resiliente: se outra rodada commitou nesse intervalo, rebaseia e
          # tenta de novo (evita a race condition que descartava pontos).
          for attempt in 1 2 3; do
            if git push; then
              echo "changed=true" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "push falhou (tentativa $attempt); rebaseando…"
            git pull --rebase --autostash origin main || true
          done
          echo "Não foi possível dar push após 3 tentativas." >&2
          exit 1
        id: commit

      # O commit acima usa [skip ci] (evita loop), o que também impede o deploy
      # automático. Quando houve mudança, disparamos o deploy do Pages
      # explicitamente para republicar o history.json atualizado.
      - name: Republicar SPA (history.json)
        if: steps.commit.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh workflow run deploy-pages.yml --ref main
