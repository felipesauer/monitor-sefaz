name: Coletar status SEFAZ

# Roda periodicamente, coleta o status da página oficial de disponibilidade e
# commita os JSONs em apps/web/public/data/ — consumidos pela SPA no GitHub Pages.
on:
  schedule:
    # A cada 30 min, nos minutos 7 e 37 — fora do minuto 0 (mais concorrido na
    # fila do GitHub). O cron do Actions é best-effort: intervalos maiores e
    # deslocados da hora cheia são honrados de forma mais consistente que */15.
    - cron: '7,37 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: collect
  cancel-in-progress: false

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - name: Coletar status
        run: pnpm --filter @monitor-sefaz/collector collect "$GITHUB_WORKSPACE/apps/web/public/data"

      - name: Commitar dados atualizados
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/public/data
          if git diff --cached --quiet; then
            echo "Sem mudanças nos dados."
          else
            git commit -m "chore(data): atualiza status SEFAZ [skip ci]"
            git push
          fi
