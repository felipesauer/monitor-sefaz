name: Deploy Worker (Cloudflare)

# Faz deploy do Cloudflare Worker (proxy de scraping ao vivo com CORS) quando o
# código do worker ou de seus pacotes muda. Requer o secret CLOUDFLARE_API_TOKEN.
on:
  push:
    branches: [main]
    paths:
      - 'apps/worker/**'
      - 'packages/**'
      - '.github/workflows/deploy-worker.yml'
  workflow_dispatch: {}

concurrency:
  group: deploy-worker
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    # Não roda em forks (que não têm o secret).
    if: github.repository == 'felipesauer/monitor-sefaz'
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Deploy
        run: pnpm --filter @monitor-sefaz/worker exec wrangler deploy
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
