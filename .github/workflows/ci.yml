name: CI

# Valida o monorepo em cada PR e em pushes para main: lint, typecheck e testes.
# O turbo cuida da ordem (build das libs antes dos testes que delas dependem).
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch: {}

# Evita rodar CI redundante: um novo push na mesma ref cancela o anterior.
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Testes
        run: pnpm test
